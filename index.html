<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Rating Snapshot - Restored Version</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  
  <style>
    :root {
      --bg-page: #f8f8f6;
      --text-main: #000000;
      --text-muted: #444444;
      --border: #cccccc;
    }

    @page { size: letter portrait; margin: 0.4in; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg-page); color: var(--text-main); font-size: 10pt; }
    .dash { max-width: 7.7in; margin: 0 auto; padding: 10px; }

    /* UI Controls */
    .controls { background: #333; color: white; padding: 12px; margin-bottom: 15px; border-radius: 8px; display: flex; gap: 15px; align-items: center; }
    .btn-print { background: #2ecc71; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

    /* Header */
    .hdr { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2pt solid #000; padding-bottom: 5px; margin-bottom: 12px; }
    .hdr h2 { font-size: 17pt; font-weight: 800; text-transform: uppercase; }
    
    .section-title { font-size: 8.5pt; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; border-left: 4px solid #000; padding-left: 8px; }

    /* Day Cards */
    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 15px; }
    .day-card { border: 1pt solid var(--border); background: #fff; padding: 8px 4px; text-align: center; border-radius: 6px; }
    .day-ratio { font-size: 15pt; font-weight: 800; display: block; line-height: 1.1; }
    .day-stats { font-size: 7.5pt; margin-top: 4px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 4px; line-height: 1.2; }

    /* Layout */
    .two-col { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 12px; margin-bottom: 12px; }
    .card { background: #fff; border: 1pt solid var(--border); border-radius: 8px; padding: 12px; }

    canvas { width: 100% !important; height: 180px !important; }

    /* Service Changes */
    .svc-row { padding: 6px 0; border-bottom: 0.5pt solid #eee; font-size: 8.5pt; }
    .svc-row:last-child { border-bottom: none; }
    .svc-name { font-weight: 700; display: flex; justify-content: space-between; }
    .svc-impact { font-size: 7pt; padding: 1px 5px; border-radius: 10px; text-transform: uppercase; }

    /* Legend */
    .legend { display: flex; gap: 15px; font-size: 8pt; justify-content: center; font-weight: 600; margin-top: 5px; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .box { width: 10px; height: 10px; border: 0.5pt solid #000; }

    @media print {
      .controls { display: none !important; }
      body { background: white; }
      .day-card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<div class="dash">
  <div class="controls">
    <select id="garageSelect" style="padding: 4px;">
      <option value="Northside 1">Northside 1</option>
      <option value="Northside 2">Northside 2</option>
      <option value="Southside 1">Southside 1</option>
      <option value="Central Depot">Central Depot</option>
    </select>
    <button class="btn-print" onclick="window.print()">Print Snapshot</button>
  </div>

  <div class="hdr">
    <div>
      <h2 id="garageTitle">Garage Snapshot</h2>
      <p style="font-weight: 600; font-size: 9pt;">Rating 2 | Effective Apr 28 – Aug 18, 2025</p>
    </div>
    <div style="text-align: right; font-size: 8pt;">
      <b>Status:</b> Pre-Rating Snapshot<br>
      <b>Printed:</b> <span id="printDate"></span>
    </div>
  </div>

  <p class="section-title">Staffing Coverage Ratio</p>
  <div class="day-grid" id="dayGrid"></div>

  <div class="two-col">
    <div class="card">
      <p class="section-title">Peak Pullout Requirements</p>
      <canvas id="peakChart"></canvas>
    </div>
    <div class="card">
      <p class="section-title">Hiring Pipeline (Graduation)</p>
      <canvas id="pipelineChart"></canvas>
    </div>
  </div>

  <div class="card">
    <p class="section-title">Service Changes Effective This Rating</p>
    <div id="svcList"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="box" style="background:#EAF3DE"></div> Safe (1.05+)</div>
    <div class="legend-item"><div class="box" style="background:#FAEEDA"></div> Marginal (1.00+)</div>
    <div class="legend-item"><div class="box" style="background:#FCEBEB"></div> At Risk (< 1.00)</div>
  </div>
</div>

<script>
  Chart.register(ChartDataLabels);
  document.getElementById('printDate').textContent = new Date().toLocaleDateString();

  let pChart, hChart;
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  function update() {
    const r = (min, max) => Math.floor(Math.random() * (max - min + 1) + min);
    const garage = document.getElementById('garageSelect').value;
    document.getElementById('garageTitle').textContent = garage;

    // 1. Restore Day Cards with Need/List/Absence
    const staffing = days.map(d => {
      const need = r(35, 50);
      const list = r(need - 5, need + 10);
      const abs = r(8, 15);
      const ratio = (list * (1 - (abs/100))) / need;
      return { d, need, list, abs, ratio };
    });

    document.getElementById('dayGrid').innerHTML = staffing.map(s => {
      const color = s.ratio >= 1.05 ? '#EAF3DE' : s.ratio >= 1.0 ? '#FAEEDA' : '#FCEBEB';
      const border = s.ratio >= 1.05 ? '#3B6D11' : s.ratio >= 1.0 ? '#854F0B' : '#A32D2D';
      return `
        <div class="day-card" style="background-color: ${color}; border-color: ${border}55;">
          <b style="font-size: 8pt; color: ${border}">${s.d}</b>
          <span class="day-ratio" style="color: ${border}">${s.ratio.toFixed(2)}</span>
          <div class="day-stats" style="color: ${border}">
            Need: ${s.need} | List: ${s.list}<br>
            <b>${s.abs}% Absence</b>
          </div>
        </div>`;
    }).join('');

    // 2. Restore Service Changes
    const changes = [
      { n: 'Route 42 - Extension', m: '+3 Ops Mon-Fri', i: 'pr', l: 'High', d: 'Increased peak pull-out requirements for Harbor District service.' },
      { n: 'Route 15 - Frequency', m: '+1 Op Mon-Sat', i: 'pa', l: 'Med', d: 'Headway reduced from 20 to 15 mins on core corridor.' }
    ];
    document.getElementById('svcList').innerHTML = changes.map(c => `
      <div class="svc-row">
        <div class="svc-name">${c.n} <span class="svc-impact" style="background:${c.i==='pr'?'#FCEBEB':'#FAEEDA'}; color:${c.i==='pr'?'#A32D2D':'#854F0B'}">${c.l}</span></div>
        <div style="font-size: 7.5pt; color: #666; margin: 2px 0;">${c.m}</div>
        <div style="font-size: 7.5pt;">${c.d}</div>
      </div>`).join('');

    // 3. Charts with Labels
    if (pChart) pChart.destroy();
    if (hChart) hChart.destroy();

    const pData = days.map(() => ({ am: r(25, 50), pm: r(30, 55) }));
    pChart = new Chart(document.getElementById('peakChart'), {
      type: 'bar',
      data: {
        labels: days,
        datasets: [
          { label: 'AM', data: pData.map(d=>d.am), backgroundColor: '#3498db' },
          { label: 'PM', data: pData.map(d=>d.pm), backgroundColor: '#2c3e50' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { 
          legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 8 } } },
          datalabels: { display: true, color: '#000', anchor: 'end', align: 'top', offset: -2, font: { size: 8, weight: 'bold' } }
        },
        scales: { y: { display: false }, x: { grid: { display: false } } }
      }
    });

    const hData = [{l:'Class Jan', s:0, e:r(2,3), o:r(5,9)}, {l:'Class Mar', s:r(5,6), e:r(8,10), o:r(4,7)}];
    hChart = new Chart(document.getElementById('pipelineChart'), {
      type: 'bar',
      data: {
        labels: hData.map(h=>h.l),
        datasets: [{ data: hData.map(h=>[h.s, h.e]), backgroundColor: '#95a5a6' }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { 
          legend: { display: false },
          datalabels: { display: true, color: '#fff', font: { size: 9, weight: 'bold' }, formatter: (v, ctx) => `${hData[ctx.dataIndex].o} Ops` }
        },
        scales: { x: { min: 0, max: 13, ticks: { font: { size: 8 } } }, y: { ticks: { font: { size: 8 } } } }
      }
    });
  }

  document.getElementById('garageSelect').addEventListener('change', update);
  window.onload = update;
</script>
</body>
</html>
