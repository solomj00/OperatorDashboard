<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Rating Snapshot Dashboard</title>
  <style>
    :root {
      --bg-page: #f5f4f0;
      --bg-card: #ffffff;
      --text-main: #1a1a18;
      --text-muted: #5f5e5a;
      --border-light: rgba(0,0,0,0.12);
      
      /* Status Colors */
      --safe-bg: #EAF3DE; --safe-text: #3B6D11; --safe-border: #C6DBAF;
      --warn-bg: #FAEEDA; --warn-text: #854F0B; --warn-border: #FAC775;
      --risk-bg: #FCEBEB; --risk-text: #A32D2D; --risk-border: #F7C1C1;
      
      --primary: #378ADD;
      --secondary: #534AB7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text-main); padding: 2rem; min-height: 100vh; }
    .dash { max-width: 1000px; margin: 0 auto; }

    /* Header & Select */
    .hdr { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .hdr h2 { font-size: 20px; font-weight: 600; }
    .garage-select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-light); font-size: 14px; cursor: pointer; }

    /* Grid Layouts */
    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 800px) { .day-grid { grid-template-columns: repeat(4, 1fr); } .two-col { grid-template-columns: 1fr; } }

    /* Components */
    .sl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 12px; }
    .card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 12px; padding: 1.25rem; }
    
    /* Day Cards Status Styling */
    .day-card { border-radius: 10px; padding: 15px 10px; text-align: center; border: 1px solid var(--border-light); background: var(--bg-card); transition: transform 0.2s; }
    .day-card.safe { border-color: var(--safe-border); }
    .day-card.marginal { background: var(--warn-bg); border-color: var(--warn-border); }
    .day-card.risk { background: var(--risk-bg); border-color: var(--risk-border); }

    .day-ratio { font-size: 24px; font-weight: 700; margin: 5px 0; }
    .day-card.safe .day-ratio { color: var(--safe-text); }
    .day-card.marginal .day-ratio { color: var(--warn-text); }
    .day-card.risk .day-ratio { color: var(--risk-text); }

    .pill { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 8px; }
    .pill.pg { background: var(--safe-bg); color: var(--safe-text); }
    .pill.pa { background: #fff; color: var(--warn-text); border: 1px solid var(--warn-border); }
    .pill.pr { background: #fff; color: var(--risk-text); border: 1px solid var(--risk-border); }

    canvas { width: 100% !important; height: 180px !important; }
    
    .svc-row { padding: 12px 0; border-bottom: 1px solid var(--border-light); }
    .svc-row:last-child { border-bottom: none; }
    .svc-name { font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

<div class="dash">
  <div class="hdr">
    <div>
      <h2 id="garageTitle">Northside 1 Snapshot</h2>
      <p style="font-size: 13px; color: var(--text-muted)">Rating 2: Apr 28 – Aug 18, 2025</p>
    </div>
    <select class="garage-select" id="garageSelect">
      <optgroup label="Northside">
        <option value="Northside 1">Northside 1</option>
        <option value="Northside 2">Northside 2</option>
      </optgroup>
      <optgroup label="Southside">
        <option value="Southside 1">Southside 1</option>
        <option value="Southside 2">Southside 2</option>
      </optgroup>
    </select>
  </div>

  <p class="sl">Weekly Staffing Coverage</p>
  <div class="day-grid" id="dayGrid"></div>

  <div class="two-col">
    <div class="card">
      <p class="sl">Peak Bus Requirements</p>
      <canvas id="peakChart"></canvas>
    </div>
    <div class="card">
      <p class="sl">Hiring Pipeline (Graduation Weeks)</p>
      <canvas id="pipelineChart"></canvas>
    </div>
  </div>

  <div class="card">
    <p class="sl">Active Service Changes</p>
    <div id="svcList"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
  let peakChart, pipelineChart;
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  // 1. Data Generator (Makes dropdown work)
  function getGarageData(garageName) {
    // Seeded random based on name length so data is "sticky" per garage
    const seed = garageName.length;
    const rng = (max, min = 0) => Math.floor(Math.random() * (max - min + 1) + min);

    return {
      staffing: days.map(d => {
        const req = rng(60, 30);
        const list = rng(req + 10, req - 5);
        const abs = (rng(15, 8) / 100);
        const ratio = (list * (1 - abs)) / req;
        return { day: d, req, list, abs, ratio };
      }),
      peaks: days.map(d => ({ am: rng(55, 20), pm: rng(60, 25) })),
      hiring: [
        { label: 'Class A', ops: rng(5, 2), start: 0, end: 3 },
        { label: 'Class B', ops: rng(4, 1), start: 4, end: 7 },
        { label: 'Class C', ops: rng(6, 3), start: 8, end: 11 }
      ]
    };
  }

  // 2. Helper for Status
  const getStatus = (r) => {
    if (r >= 1.05) return { cls: 'safe', pill: 'pg', lbl: 'Safe' };
    if (r >= 1.00) return { cls: 'marginal', pill: 'pa', lbl: 'Marginal' };
    return { cls: 'risk', pill: 'pr', lbl: 'At Risk' };
  };

  // 3. UI Update Logic
  function updateDashboard() {
    const garage = document.getElementById('garageSelect').value;
    document.getElementById('garageTitle').textContent = `${garage} Snapshot`;
    const data = getGarageData(garage);

    // Update Grid
    const grid = document.getElementById('dayGrid');
    grid.innerHTML = data.staffing.map(d => {
      const s = getStatus(d.ratio);
      return `
        <div class="day-card ${s.cls}">
          <div style="font-size: 11px; color: var(--text-muted)">${d.day}</div>
          <div class="day-ratio">${d.ratio.toFixed(2)}</div>
          <div style="font-size: 10px">${Math.round(d.abs * 100)}% absence</div>
          <span class="pill ${s.pill}">${s.lbl}</span>
        </div>`;
    }).join('');

    // Update Service Changes (Dummy context)
    document.getElementById('svcList').innerHTML = `
      <div class="svc-row">
        <div class="svc-name">Route 101 Expansion <span class="pill pg">Low Impact</span></div>
        <p style="font-size: 12px; color: var(--text-muted)">Adding ${data.hiring[0].ops} runs to midday service.</p>
      </div>`;

    renderCharts(data);
  }

  // 4. Charting Logic
  function renderCharts(data) {
    if (peakChart) peakChart.destroy();
    if (pipelineChart) pipelineChart.destroy();

    // Peak Chart
    peakChart = new Chart(document.getElementById('peakChart'), {
      type: 'bar',
      data: {
        labels: days,
        datasets: [
          { label: 'AM Peak', data: data.peaks.map(p => p.am), backgroundColor: '#378ADD' },
          { label: 'PM Peak', data: data.peaks.map(p => p.pm), backgroundColor: '#534AB7' }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // Pipeline Chart (Using floating bars)
    pipelineChart = new Chart(document.getElementById('pipelineChart'), {
      type: 'bar',
      data: {
        labels: data.hiring.map(h => h.label),
        datasets: [{
          data: data.hiring.map(h => [h.start, h.end]),
          backgroundColor: '#378ADD',
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { title: { display: true, text: 'Weeks from Today', font: { size: 10 } } } }
      }
    });
  }

  // Event Listeners
  document.getElementById('garageSelect').addEventListener('change', updateDashboard);
  window.onload = updateDashboard;
</script>

</body>
</html>
